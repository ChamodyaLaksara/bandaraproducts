<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandara POS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter; padding:20px; background:#eef6fa; }
button { padding:10px 20px; cursor:pointer; }
</style>
</head>

<body>

<h2>Bandara POS</h2>

<input id="name" placeholder="Product name">
<input id="buying_price" placeholder="Buying price">
<input id="selling_price" placeholder="Selling price">
<input id="stock_qty" placeholder="Stock">

<button onclick="addProduct()">Save</button>

<hr>

<select id="productSelect"></select>
<input id="qty" value="1">
<button onclick="addToCart()">Add to Cart</button>

<ul id="productList"></ul>

<h3>Total: Rs. <span id="total">0</span></h3>
<button onclick="checkout()">Checkout</button>

<script>

const API = "https://bandaraproducts-production.up.railway.app";

let products = [];
let cart = [];

// ✅ LOAD PRODUCTS (Improved)
async function loadProducts() {
  try {
    console.log("Loading products...");

    const res = await fetch(`${API}/products`);

    if (!res.ok) {
      throw new Error("Server not responding");
    }

    const data = await res.json();

    products = data;

    const list = document.getElementById("productList");
    const select = document.getElementById("productSelect");

    list.innerHTML = "";
    select.innerHTML = "";

    data.forEach(p => {
      list.innerHTML += `
        <li>
          ${p.name} - Rs.${p.selling_price}
          <button onclick="deleteProduct(${p.id})">Delete</button>
        </li>
      `;

      select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });

    console.log("Products loaded successfully");

  } catch (err) {
    console.error("ERROR:", err);

    alert("❌ Backend connection failed!\n\n👉 Check:\n1. Railway server running?\n2. API URL correct?\n3. Database connected?");
  }
}

// ✅ ADD PRODUCT
async function addProduct() {
  try {
    const data = {
      name: name.value,
      buying_price: buying_price.value,
      selling_price: selling_price.value,
      stock_qty: stock_qty.value
    };

    const res = await fetch(`${API}/add-product`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const msg = await res.text();

    alert(msg);
    loadProducts();

  } catch (err) {
    console.error(err);
    alert("❌ Failed to add product");
  }
}

// ✅ DELETE PRODUCT
async function deleteProduct(id) {
  try {
    await fetch(`${API}/delete-product/${id}`, { method: "DELETE" });
    loadProducts();
  } catch (err) {
    console.error(err);
    alert("❌ Delete failed");
  }
}

// ✅ ADD TO CART
function addToCart() {
  const id = productSelect.value;
  const qtyVal = parseInt(qty.value);

  const product = products.find(p => p.id == id);

  if (!product) {
    alert("❌ Product not found");
    return;
  }

  cart.push({
    product_id: id,
    name: product.name,
    price: product.selling_price,
    qty: qtyVal
  });

  renderCart();
}

// ✅ RENDER CART
function renderCart() {
  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

// ✅ CHECKOUT
async function checkout() {
  try {
    if (cart.length === 0) {
      alert("⚠️ Cart is empty");
      return;
    }

    const res = await fetch(`${API}/create-sale`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        shop_id: 1,
        items: cart
      })
    });

    const msg = await res.text();

    alert(msg);

    cart = [];
    renderCart();
    loadProducts();

  } catch (err) {
    console.error(err);
    alert("❌ Checkout failed");
  }
}

// 🔥 Auto reload if Railway sleep
setInterval(() => {
  console.log("Pinging server...");
  fetch(`${API}/products`).catch(()=>{});
}, 30000);

// INIT
loadProducts();

</script>

</body>
</html>
