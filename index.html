<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandara POS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter; padding:20px; background:#eef6fa; }
button { padding:10px 20px; cursor:pointer; }
</style>
</head>

<body>

<h2>Bandara POS</h2>

<input id="name" placeholder="Product name">
<input id="buying_price" placeholder="Buying price">
<input id="selling_price" placeholder="Selling price">
<input id="stock_qty" placeholder="Stock">

<button onclick="addProduct()">Save</button>

<hr>

<select id="productSelect"></select>
<input id="qty" value="1">
<button onclick="addToCart()">Add to Cart</button>

<ul id="productList"></ul>

<h3>Total: Rs. <span id="total">0</span></h3>
<button onclick="checkout()">Checkout</button>

<script>

const API = "https://bandaraproducts-production.up.railway.app";

let products = [];
let cart = [];
let editId = null;

// LOAD PRODUCTS
function loadProducts() {
  fetch(`${API}/products`)
    .then(res => res.json())
    .then(data => {
      products = data;
      const list = document.getElementById("productList");
      const select = document.getElementById("productSelect");

      list.innerHTML = "";
      select.innerHTML = "";

      data.forEach(p => {
        list.innerHTML += `
          <li>
            ${p.name} - Rs.${p.selling_price}
            <button onclick="deleteProduct(${p.id})">Delete</button>
          </li>
        `;

        select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
      });
    })
    .catch(() => alert("❌ Backend connection failed"));
}

// ADD PRODUCT
function addProduct() {
  const data = {
    name: name.value,
    buying_price: buying_price.value,
    selling_price: selling_price.value,
    stock_qty: stock_qty.value
  };

  fetch(`${API}/add-product`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    loadProducts();
  });
}

// DELETE
function deleteProduct(id) {
  fetch(`${API}/delete-product/${id}`, { method: "DELETE" })
  .then(() => loadProducts());
}

// ADD TO CART
function addToCart() {
  const id = productSelect.value;
  const qtyVal = parseInt(qty.value);

  const product = products.find(p => p.id == id);

  cart.push({
    product_id: id,
    name: product.name,
    price: product.selling_price,
    qty: qtyVal
  });

  renderCart();
}

// RENDER CART
function renderCart() {
  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

// CHECKOUT
function checkout() {
  fetch(`${API}/create-sale`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      shop_id: 1,
      items: cart
    })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    cart = [];
    renderCart();
    loadProducts();
  });
}

loadProducts();

</script>

</body>
</html>
